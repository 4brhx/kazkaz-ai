<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KazKaz AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar Overlay for Mobile -->
        <div class="sidebar-overlay" id="sidebarOverlay"></div>

        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <i class="fas fa-robot"></i>
                    <span>KazKaz AI</span>
                </div>
                <button class="new-chat-btn" id="newChatBtn">
                    <i class="fas fa-plus"></i>
                    <span>محادثة جديدة</span>
                </button>
            </div>
            <div class="sidebar-conversations" id="conversationsList">
                <!-- Conversations will be inserted here -->
            </div>
            <div class="sidebar-footer">
                <button class="theme-toggle" id="themeToggle">
                    <i class="fas fa-moon"></i>
                    <span>الوضع الداكن</span>
                </button>
            </div>
        </aside>

        <!-- Main Chat Area -->
        <main class="chat-main">
            <!-- Top Bar -->
            <header class="chat-header">
                <button class="hamburger-btn" id="hamburgerBtn">
                    <i class="fas fa-bars"></i>
                </button>
                <h1 class="chat-title" id="chatTitle">محادثة جديدة</h1>
                <div class="header-spacer"></div>
            </header>

            <!-- Messages Area -->
            <div class="messages-container" id="messagesContainer">
                <div class="welcome-screen" id="welcomeScreen">
                    <div class="welcome-icon">
                        <i class="fas fa-robot"></i>
                    </div>
                    <h2>مرحباً بك في KazKaz AI</h2>
                    <p>كيف أقدر أساعدك اليوم؟</p>
                    <div class="suggestions">
                        <button class="suggestion-btn" data-text="اشرحلي الذكاء الاصطناعي بشكل مبسط">
                            <i class="fas fa-lightbulb"></i>
                            <span>اشرحلي الذكاء الاصطناعي</span>
                        </button>
                        <button class="suggestion-btn" data-text="ساعدني أكتب كود بايثون">
                            <i class="fas fa-code"></i>
                            <span>ساعدني أكتب كود</span>
                        </button>
                        <button class="suggestion-btn" data-text="اكتبلي مقال عن التكنولوجيا">
                            <i class="fas fa-pen-fancy"></i>
                            <span>اكتبلي مقال</span>
                        </button>
                        <button class="suggestion-btn" data-text="ترجملي هذا النص للإنجليزي">
                            <i class="fas fa-language"></i>
                            <span>ترجملي نص</span>
                        </button>
                    </div>
                </div>
                <div class="messages-list" id="messagesList"></div>
            </div>

            <!-- Input Area -->
            <div class="input-area">
                <div class="input-container">
                    <div class="input-wrapper">
                        <label class="file-upload-btn" id="fileUploadBtn">
                            <i class="fas fa-paperclip"></i>
                            <input type="file" id="fileInput" accept="image/*,.pdf,.txt,.doc,.docx" hidden>
                        </label>
                        <textarea id="messageInput" placeholder="اكتب رسالتك هنا..." rows="1"></textarea>
                        <button class="send-btn" id="sendBtn" disabled>
                            <i class="fas fa-paper-plane"></i>
                        </button>
                    </div>
                    <div class="file-preview" id="filePreview" style="display:none;">
                        <div class="file-preview-content">
                            <i class="fas fa-file"></i>
                            <span id="fileName"></span>
                            <button class="remove-file-btn" id="removeFileBtn">
                                <i class="fas fa-times"></i>
                            </button>
                        </div>
                    </div>
                </div>
                <p class="input-disclaimer">KazKaz AI قد يرتكب أخطاء. تحقق من المعلومات المهمة.</p>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
